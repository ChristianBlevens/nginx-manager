# =============================================================================
# 50-projects.conf - Self-hosted portfolio projects
# =============================================================================
# Each project lives at christianblevens.me/<slug>/.
# Cloned on the host into <deploy-dir>/projects/<slug>/ and mounted read-only
# at /usr/share/nginx/html/projects/ inside the container (see docker-compose.yml).
#
# To add a project: clone its repo as projects/<slug>/ on the host and copy one
# of the blocks below, replacing <slug> in the three places.
# =============================================================================

# daily-habits
location = /daily-habits { return 301 /daily-habits/; }
location ^~ /daily-habits/ {
    alias /usr/share/nginx/html/projects/daily-habits/;
    try_files $uri $uri/ /daily-habits/index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header X-Frame-Options "SAMEORIGIN" always;
}

