# =============================================================================
# 10-website.conf - Personal Website (christianblevens.me)
# =============================================================================
# Serves at: /
# Backend: Static files only
#
# BACKWARDS COMPATIBILITY:
# Requests to /?pageId=... are redirected to /comments/?pageId=...
# This ensures existing embedded comments continue to work until updated.
# =============================================================================

# Backwards compatibility: redirect root with pageId to /mycomments
# This catches requests from old embed codes that use data-instance pointing to root
location = / {
    # Check if pageId query parameter exists
    if ($arg_pageId) {
        return 301 /comments/$is_args$args;
    }

    # Normal website serving
    root /usr/share/nginx/html/website;
    index index.html;
    try_files $uri /index.html;

    # Allow embedding (for resume/project modals)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Cache-Control "no-cache";
}

# Root path - Personal Website (all other paths)
# Note: This is a catch-all that will be overridden by more specific locations
# in other config files (20-mycomments.conf, 30-room.conf, etc.)
location / {
    # Disable rate limiting for static files
    root /usr/share/nginx/html/website;
    index index.html;
    try_files $uri $uri/ /index.html;

    # Allow embedding (for resume/project modals)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Cache-Control "no-cache";
}

# Website static assets with long cache.
# Note: location priority means `^~` prefix matches in other files (comments,
# room, bpd, projects/*) win against this regex regardless. The exclusion list
# is kept as belt-and-suspenders — extend it when adding new site sections.
location ~* ^/(?!comments|room|bpd|projects|daily-habits|roof|sunlight|global-time|gravity-wars|random-bookmark|audio-repositioner|v1|old-portfolio).*\.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot|otf|map|mp4|webm|mov)$ {
    root /usr/share/nginx/html/website;
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Frame-Options "SAMEORIGIN" always;
    access_log off;
}
