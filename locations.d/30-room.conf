# =============================================================================
# 30-room.conf - Redirect to voluhaus.com
# =============================================================================
# The Room Designer now lives at voluhaus.com.
# Redirect all /room/* traffic to the new domain.
# =============================================================================

location ^~ /room/ {
    rewrite ^/room/(.*)$ https://voluhaus.com/$1 permanent;
}

location = /room {
    return 301 https://voluhaus.com/;
}
