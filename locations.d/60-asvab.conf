# =============================================================================
# 60-asvab.conf - ASVAB Practice (christianblevens.me/asvab)
# =============================================================================
# All-in-one FastAPI app: serves static files, API, auth, and Stripe from
# a single container. All paths live under /asvab/ — nginx strips the prefix
# before proxying so FastAPI sees root-relative paths.
#
# Container: asvab-web:3000 (proxy-network)
# Deployed at: ~/asvab-practice/ on host
# =============================================================================

location = /asvab {
    return 301 /asvab/;
}

location ^~ /asvab/ {
    set $asvab_upstream http://asvab-web:3000;

    rewrite ^/asvab/(.*) /$1 break;
    proxy_pass $asvab_upstream;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Prefix /asvab;

    # Required for SSE streaming (AI tutor responses)
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    add_header X-Accel-Buffering no;

    # Extended timeouts for AI streaming responses
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header X-Frame-Options "SAMEORIGIN" always;
}
