# =============================================================================
# voluhaus.conf - Room Furniture Planner (voluhaus.com)
# =============================================================================
# Dedicated domain for the Room Designer application.
# Proxies all traffic to the roomdesigner FastAPI container.
# =============================================================================

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name voluhaus.com www.voluhaus.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name voluhaus.com www.voluhaus.com;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/voluhaus-fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/voluhaus-privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;
    ssl_session_cache shared:VoluHausTLS:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/voluhaus-chain.pem;

    # Docker DNS for container name resolution
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 10s;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Proxy everything to roomdesigner container
    location / {
        set $roomdesigner_upstream http://roomdesigner:8000;
        proxy_pass $roomdesigner_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Disable caching for HTML/API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        expires off;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # File uploads
        client_max_body_size 100m;

        # Timeouts (extended for AI processing)
        proxy_connect_timeout 60s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;

        # Retry on connection errors
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 30s;
    }
}
